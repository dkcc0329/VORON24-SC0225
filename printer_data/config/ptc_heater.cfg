# Set PTC heater temperature directly (using M141 instead of M140)
[gcode_macro M141]
description: Set PTC Heater Temperature
variable_max_ptc_core_temp: 115  # Safety limit for PTC core
gcode:
   {% set s = params.S|default(0)|float %}
   {% if s > 115 %}
      {% set s = 115 %}
      RESPOND MSG="PTC heater temperature limited to 115C for safety"
   {% endif %}
   SET_HEATER_TEMPERATURE HEATER=PTC_heater TARGET={s}
   
   # Start PTC core temperature monitoring if heater is enabled
   {% if s > 0 %}
      UPDATE_DELAYED_GCODE ID=MONITOR_PTC_TEMP DURATION=2
   {% else %}
      CLEAR_DELAYED_GCODE ID=MONITOR_PTC_TEMP
   {% endif %}

# Set target chamber temperature (renamed to M142)
[gcode_macro M142]
description: Set Target Chamber Temperature
variable_target: 0
gcode:
   {% set s = params.S|default(0)|float %}
   {% if s > 60 %}
      {% set s = 60 %}
      RESPOND MSG="Chamber temperature target limited to 60C for safety"
   {% endif %}
   SET_GCODE_VARIABLE MACRO=M142 VARIABLE=target VALUE={s}
   M117 Chamber target set to {s}C

# Wait for chamber to reach target temperature (using M192 instead of M191)
[gcode_macro M191]
description: Wait for Chamber Temperature
gcode:
   {% set s = params.S|default(printer["gcode_macro M142"].target)|float %}
   {% if s == 0 %}
      M117 No chamber target set
      RESPOND MSG="No chamber target temperature specified"
   {% else %}
      M117 Waiting for chamber to reach {s}C...
      
      # Start PTC heater if it's not already on
      {% if printer['heater_generic PTC_heater'].target <= 0 %}
         M141 S50  # Default PTC temperature if not already set
      {% endif %}
      
      # Wait for enclosure to reach target
      TEMPERATURE_WAIT SENSOR="heater_generic PTC_heater" MINIMUM={s}
      M117 Chamber at target temperature ({s}C)
      RESPOND MSG="Chamber has reached target temperature"
   {% endif %}

# PTC core temperature monitoring system
[delayed_gcode MONITOR_PTC_TEMP]
initial_duration: 0
gcode:
   {% set MAX_TEMP = printer["gcode_macro M141"].max_ptc_core_temp %}
   {% set CURRENT_TEMP = printer["temperature_sensor PTC_core"].temperature %}
   
   # Check if PTC core temperature is exceeding safety limits
   {% if CURRENT_TEMP > MAX_TEMP %}
      # Emergency shutdown of PTC heater
      SET_HEATER_TEMPERATURE HEATER=PTC_heater TARGET=0
      RESPOND TYPE=error MSG="SAFETY ALERT: PTC core temperature ({CURRENT_TEMP}C) exceeded safety limit ({MAX_TEMP}C)! Heater disabled."
      M117 PTC OVERTEMP! DISABLED
   {% elif printer['heater_generic PTC_heater'].target > 0 %}
      # Continue monitoring if heater is still active
      UPDATE_DELAYED_GCODE ID=MONITOR_PTC_TEMP DURATION=2
   {% endif %}

##### HEAT SOAK MACRO #####   


[gcode_macro HEAT_SOAK]
description: Heat soak the chamber with preparation steps and temperature control
gcode:
    {% set CHAMBER_TEMP = params.TEMP|default(50)|float %}
    {% set SOAK_TIME = params.TIME|default(5)|int %}
    {% set PTC_CORE_LIMIT = params.CORE_LIMIT|default(115)|float %}
    
    # Set PTC core temperature safety limit
    SET_GCODE_VARIABLE MACRO=M141 VARIABLE=max_ptc_core_temp VALUE={PTC_CORE_LIMIT}
    
    # Output configuration summary
    RESPOND MSG="Chamber heat soak - Target: {CHAMBER_TEMP}C, Soak time: {SOAK_TIME}min"

        
    # Start the chamber heat soak process
    M117 Starting chamber heat soak...
    RESPOND MSG="Starting chamber heat soak process"
    
    # Set chamber target temperature
    SET_HEATER_TEMPERATURE HEATER=PTC_heater TARGET={CHAMBER_TEMP}
    
    # Home printer and prepare
    RESPOND TYPE=command MSG='Homing printer for heat soak'
    
    # Wait for chamber to reach target temperature
    M117 Waiting for chamber to reach {CHAMBER_TEMP}C...
    TEMPERATURE_WAIT SENSOR="heater_generic PTC_heater" MINIMUM={CHAMBER_TEMP}
    
    # Additional soak time after reaching temperature
    {% if SOAK_TIME > 0 %}
        M117 Additional soak for {SOAK_TIME} minutes
        RESPOND MSG="Chamber at temperature, soaking for {SOAK_TIME} minutes"
        G4 P{SOAK_TIME * 60 * 1000}  # Dwell for specified minutes
    {% endif %}
    
    M117 Heat soak complete
    RESPOND MSG="Heat soak process complete"
    
# New safety parameter macro
[gcode_macro SET_PTC_SAFETY_LIMIT]
description: Set maximum allowed PTC core temperature before emergency shutdown
gcode:
    {% set TEMP = params.TEMP|default(115)|float %}
    {% if TEMP < 125 and TEMP > 55 %}
        SET_GCODE_VARIABLE MACRO=M141 VARIABLE=max_ptc_core_temp VALUE={TEMP}
        RESPOND MSG="PTC core safety limit set to {TEMP}C"
    {% else %}
        RESPOND TYPE=error MSG="Safety limit must be between 55C and 125C"
    {% endif %}