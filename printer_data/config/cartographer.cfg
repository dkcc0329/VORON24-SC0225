[mcu scanner]
serial: /dev/serial/by-id/usb-Cartographer_614e_24003400124330484D353820-if00
restart_method: command
#serial: /dev/serial/by-id/usb-cartographer_cartographer_

[scanner]
mcu: scanner            
x_offset: 0                          
y_offset: 32.5                         
backlash_comp: 0.00741
trigger_distance: 2.0
trigger_dive_threshold: 1.5
trigger_hysteresis: 0.006
cal_nozzle_z: 0.1
cal_floor: 0.1
cal_ceil: 5.0
cal_speed: 1.0
cal_move_speed: 10.0
sensor: cartographer
sensor_alt: carto      
mesh_runs: 1
scanner_touch_threshold = 3000
scanner_touch_speed = 3
scanner_touch_accel = 100
scanner_touch_z_offset = 0.145

[bed_mesh]
zero_reference_position: 175, 175    
speed: 500
horizontal_move_z: 5
mesh_min: 15, 32.5 
mesh_max: 328, 320 
probe_count: 30, 30 
algorithm: bicubic
fade_start: 0
fade_end: 2
mesh_pps = 2,2
scan_overshoot: 2 

[temperature_sensor Cartographer_Mcu]
sensor_type: temperature_mcu
sensor_mcu: scanner
min_temp: 0
max_temp: 105





