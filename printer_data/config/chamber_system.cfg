############################################################
################### CHAMBER HEATER SYSTEM ##################
############################################################

######################
### Chamber Heater ###
######################

[heater_generic chamber]
heater_pin: PA2
sensor_type: Generic 3950  #EPCOS 100K B57560G104F
sensor_pin: PF5  #PF4
control: watermark
max_power: 1.0
max_delta: 1.0
min_temp: 0
max_temp: 80
gcode_id: C

[verify_heater chamber]
max_error: 120
check_gain_time: 240
hysteresis: 10
heating_gain: 1

##########################
### PTC Cooling Fan ###
##########################

[controller_fan PTC]
pin: PD14
max_power: 1.0
kick_start_time: 0.2
heater: chamber
fan_speed: 1.0
idle_timeout: 30
stepper:

#################################################
### Fake Chamber Sensor For UI ###
#################################################

# This makes Mainsail/Fluidd show a chamber graph.
# It does NOT control heating.

[temperature_sensor ptc_heater]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF4
min_temp: 0
max_temp: 100

#################################################
### M141 - Set Chamber Temperature ###
#################################################

[gcode_macro M141]
description: Set chamber temperature
gcode:
    {% set S = params.S|default(0)|float %}

    # Safety limit
    {% set S = [S, 80]|min %}

    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={S}

    RESPOND MSG="Chamber temperature set to {S}C"

#################################################
### M191 - Wait For Chamber Temperature ###
#################################################

[gcode_macro M191]
description: Wait for chamber temperature
gcode:
    {% set S = params.S|default(0)|float %}

    M141 S{S}

    M117 Waiting for chamber temperature...

    TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={S}

    RESPOND MSG="Chamber reached {S}C"

#################################################
### Heat Soak ###
#################################################

[gcode_macro HEAT_SOAK]
description: Chamber heat soak
gcode:
    {% set TEMP = params.TEMP|default(50)|float %}
    {% set TIME = params.TIME|default(5)|int %}

    RESPOND MSG="Starting chamber heat soak"

    M141 S{TEMP}

    M191 S{TEMP}

    {% if TIME > 0 %}

        M117 Heat soaking...

        G4 P{TIME * 60000}

    {% endif %}

    RESPOND MSG="Heat soak complete"

############################################################
################### BED FAN SYSTEM #########################
############################################################

[gcode_macro _BEDFANVARS]
variable_threshold: 90
variable_fast: 0.8
variable_slow: 0.3
variable_fast_c: 0.8
variable_slow_c: 0.2
variable_chamber_target: 65
gcode:

##########################
### Bed Circulation Fan ###
##########################

[fan_generic BedFans]
pin: PD15
cycle_time: 0.04
kick_start_time: 0.25

##########################
### Fan Aliases ###
##########################

[gcode_macro _BEDFANSSLOW]
gcode:
    {% set SLOW = printer["gcode_macro _BEDFANVARS"].slow|float %}
    SET_FAN_SPEED FAN=BedFans SPEED={SLOW}

[gcode_macro _BEDFANSFAST]
gcode:
    {% set FAST = printer["gcode_macro _BEDFANVARS"].fast|float %}
    SET_FAN_SPEED FAN=BedFans SPEED={FAST}

[gcode_macro _BEDFANSOFF]
gcode:
    SET_FAN_SPEED FAN=BedFans SPEED=0

#################################################
### Override SET_HEATER_TEMPERATURE ###
#################################################

[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set HEATER = params.HEATER|default("")|lower %}
    {% set TARGET = params.TARGET|default(0)|float %}
    {% set THRESHOLD = printer["gcode_macro _BEDFANVARS"].threshold|float %}

    ################################
    # Extruder
    ################################

    {% if HEATER == "extruder" %}

        M104 S{TARGET}

    ################################
    # Bed Heater
    ################################

    {% elif HEATER == "heater_bed" %}

        M140 S{TARGET}

        {% if TARGET >= THRESHOLD %}

            _BEDFANSSLOW
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1

        {% else %}

            _BEDFANSOFF
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0

        {% endif %}

    ################################
    # Chamber Heater
    ################################

    {% elif HEATER == "chamber" %}

        {% set TARGET = [TARGET, 80]|min %}

        _SET_HEATER_TEMPERATURE HEATER=chamber TARGET={TARGET}

    ################################
    # Other Heaters
    ################################

    {% else %}

        _SET_HEATER_TEMPERATURE HEATER={HEATER} TARGET={TARGET}

    {% endif %}

#################################################
### Override M190 ###
#################################################

[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set S = params.S|int %}
    {% set THRESHOLD = printer["gcode_macro _BEDFANVARS"].threshold|int %}

    {% if S >= THRESHOLD %}

        _BEDFANSSLOW

    {% else %}

        _BEDFANSOFF

    {% endif %}

    M140 S{S}

    {% if S != 0 %}

        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={S} MAXIMUM={S + 5}

    {% endif %}

    {% if S >= THRESHOLD %}

        _BEDFANSFAST

    {% endif %}

#################################################
### Turn Off Heaters ###
#################################################

[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    _BEDFANSOFF
    UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    _TURN_OFF_HEATERS

#################################################
### Bed Fan Monitoring Loop ###
#################################################

[delayed_gcode bedfanloop]
gcode:
    {% set THRESHOLD = printer["gcode_macro _BEDFANVARS"].threshold|int %}
    {% set FAST = printer["gcode_macro _BEDFANVARS"].fast|float %}
    {% set SLOW = printer["gcode_macro _BEDFANVARS"].slow|float %}
    {% set FAST_C = printer["gcode_macro _BEDFANVARS"].fast_c|float %}
    {% set SLOW_C = printer["gcode_macro _BEDFANVARS"].slow_c|float %}
    {% set CHAMBER_TARGET = printer["gcode_macro _BEDFANVARS"].chamber_target|float %}
    {% set CHAMBER_TEMP = printer['heater_generic chamber'].temperature|float %}

    {% if printer.heater_bed.target >= THRESHOLD %}

        {% if printer.heater_bed.temperature >= (printer.heater_bed.target - 1) %}

            {% if CHAMBER_TEMP < CHAMBER_TARGET %}

                SET_FAN_SPEED FAN=BedFans SPEED={FAST_C}

            {% else %}

                SET_FAN_SPEED FAN=BedFans SPEED={SLOW_C}

            {% endif %}

        {% else %}

            SET_FAN_SPEED FAN=BedFans SPEED={SLOW}

        {% endif %}

        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=10

    {% else %}

        SET_FAN_SPEED FAN=BedFans SPEED=0

    {% endif %}